name: ATOM SGLang Test

on:
  pull_request:
    branches: [main]  # Triggers on PRs targeting `main`
    types: [opened, synchronize, reopened, ready_for_review, closed]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ATOM_BASE_NIGHTLY_IMAGE: rocm/atom-dev:latest
  SGLANG_IMAGE_CACHE_KEEP: "3"
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/ATOM.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id || github.sha }}
  NIGHTLY_SGLANG_IMAGE_TAG: rocm/atom-dev:sglang-latest
  SGLANG_REF: "v0.5.10"

jobs:
  # ---------- SGLANG CI path (pull_request only) ----------
  check-signal:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    name: Check Pre Checkin Signal
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Download and check pre-checkin signal
        run: bash ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  download_aiter_wheel:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    needs: [check-signal]
    name: Download aiter wheel
    runs-on: ubuntu-latest
    outputs:
      aiter_artifact_id: ${{ steps.download.outputs.aiter_artifact_id }}
      aiter_wheel_name: ${{ steps.download.outputs.aiter_wheel_name }}
    steps:
      - name: Find and download latest aiter wheel
        id: download
        run: |
          set -euo pipefail
          echo "=== Finding latest aiter-whl-main artifact from ROCm/aiter ==="

          API_URL="https://api.github.com"
          AUTH_HEADER="Authorization: token ${{ secrets.GITHUB_TOKEN }}"
          AITER_TEST_WORKFLOW_ID=179476100

          RUNS=$(curl -s -H "$AUTH_HEADER" \
            "$API_URL/repos/ROCm/aiter/actions/workflows/$AITER_TEST_WORKFLOW_ID/runs?per_page=100&branch=main&event=push")

          ARTIFACT_ID=""
          ARTIFACT_NAME=""
          for RUN_ID in $(echo "$RUNS" | jq -r '.workflow_runs[].id'); do
            ARTIFACT_JSON=$(curl -s -H "$AUTH_HEADER" \
              "$API_URL/repos/ROCm/aiter/actions/runs/$RUN_ID/artifacts" \
              | jq '[.artifacts[] | select(.name | startswith("aiter-whl-main")) | select(.expired == false)] | first')

            if [ "$ARTIFACT_JSON" != "null" ] && [ -n "$ARTIFACT_JSON" ]; then
              ARTIFACT_ID=$(echo "$ARTIFACT_JSON" | jq -r '.id')
              ARTIFACT_NAME=$(echo "$ARTIFACT_JSON" | jq -r '.name')
              echo "Found artifact in run $RUN_ID: $ARTIFACT_NAME (ID: $ARTIFACT_ID)"
              break
            fi
          done

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "ERROR: No aiter-whl-main artifact found in recent Aiter Test runs"
            exit 1
          fi

          echo "=== Downloading artifact ==="
          mkdir -p aiter-whl
          curl -s -L -H "$AUTH_HEADER" \
            "$API_URL/repos/ROCm/aiter/actions/artifacts/$ARTIFACT_ID/zip" \
            -o aiter-whl.zip
          unzip -o aiter-whl.zip -d aiter-whl
          rm -f aiter-whl.zip

          AITER_WHL=$(ls -t aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)
          if [ -z "$AITER_WHL" ]; then
            echo "ERROR: No amd_aiter wheel found in artifact"
            ls -la aiter-whl/
            exit 1
          fi

          echo "Downloaded wheel: $AITER_WHL"
          echo "aiter_artifact_id=${ARTIFACT_ID}" >> "$GITHUB_OUTPUT"
          echo "aiter_wheel_name=$(basename "$AITER_WHL")" >> "$GITHUB_OUTPUT"

      - name: Upload aiter wheel
        uses: actions/upload-artifact@v4
        with:
          name: aiter-whl
          path: aiter-whl/amd_aiter*.whl
          retention-days: 1

  build_sglang_image:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    needs: [check-signal, download_aiter_wheel]
    name: Reuse SGLANG CI image
    runs-on: build-only-atom
    env:
      SGLANG_REF: v0.5.10
      AITER_ARTIFACT_ID: ${{ needs.download_aiter_wheel.outputs.aiter_artifact_id }}
    steps:
      - name: Initialize SGLANG image tag
        run: |
          echo "SGLANG_IMAGE_TAG=rocm/atom-dev:sglang-pre-build-${GITHUB_COMMIT_SHA}" >> "$GITHUB_ENV"

      - name: Checkout ATOM repo
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Check existing prebuilt SGLANG image
        id: existing_sglang_image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          echo "image_exists=false" >> "$GITHUB_OUTPUT"

          if ! docker manifest inspect "${SGLANG_IMAGE_TAG}" >/dev/null 2>&1; then
            echo "No existing SGLANG image found for ${SGLANG_IMAGE_TAG}; building a new one."
            exit 0
          fi

          echo "Found existing SGLANG image for ${SGLANG_IMAGE_TAG}; validating SGLang commit label."
          if ! docker pull "${SGLANG_IMAGE_TAG}"; then
            echo "Failed to pull existing image ${SGLANG_IMAGE_TAG}; rebuilding it."
            exit 0
          fi

          EXISTING_SGLANG_REF="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.sglang_ref" }}' "${SGLANG_IMAGE_TAG}" 2>/dev/null || true)"
          EXISTING_AITER_ARTIFACT_ID="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.aiter_artifact_id" }}' "${SGLANG_IMAGE_TAG}" 2>/dev/null || true)"
          if [ -n "${EXISTING_SGLANG_REF}" ] && [ "${EXISTING_SGLANG_REF}" = "${SGLANG_REF}" ] && [ -n "${EXISTING_AITER_ARTIFACT_ID}" ] && [ "${EXISTING_AITER_ARTIFACT_ID}" = "${AITER_ARTIFACT_ID}" ]; then
            echo "image_exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing existing SGLANG image for ${SGLANG_IMAGE_TAG} (SGLang commit ${EXISTING_SGLANG_REF}, aiter artifact ${EXISTING_AITER_ARTIFACT_ID})."
          else
            echo "Existing image label mismatch or missing."
            echo "Expected SGLang commit ${SGLANG_REF}, got ${EXISTING_SGLANG_REF:-<missing>}."
            echo "Expected aiter artifact ${AITER_ARTIFACT_ID}, got ${EXISTING_AITER_ARTIFACT_ID:-<missing>}."
          fi

      - name: Download aiter wheel
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: aiter-whl
          path: aiter-whl

      - name: Generate SGLANG overlay Dockerfile
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' }}
        run: |
          cat <<'EOF' > Dockerfile.mod
          ARG SGLANG_BASE_IMAGE
          FROM ${SGLANG_BASE_IMAGE}
          ARG GITHUB_REPO_URL
          ARG GITHUB_COMMIT_SHA
          ARG SGLANG_REF
          ARG AITER_ARTIFACT_ID
          ARG INSTALL_LM_EVAL=1
          LABEL com.rocm.atom.sglang_ref="${SGLANG_REF}"
          LABEL com.rocm.atom.aiter_artifact_id="${AITER_ARTIFACT_ID}"
          COPY aiter-whl/ /tmp/aiter-whl/
          RUN if [ "${INSTALL_LM_EVAL}" = "1" ]; then pip install -U "lm-eval[api]"; else echo "Skip lm-eval install"; fi
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true && \
              pip uninstall -y amd-aiter || true && \
              rm -rf /app/aiter-test && \
              AITER_WHL="$(ls -t /tmp/aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)" && \
              if [ -z "${AITER_WHL}" ]; then echo "ERROR: No amd_aiter wheel found under /tmp/aiter-whl"; ls -la /tmp/aiter-whl || true; exit 1; fi && \
              pip install "${AITER_WHL}" && \
              echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true && \
              rm -rf /tmp/aiter-whl
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true && \
              pip uninstall -y atom || true && \
              rm -rf /app/ATOM && \
              git clone "${GITHUB_REPO_URL}" /app/ATOM && \
              cd /app/ATOM && \
              git checkout "${GITHUB_COMMIT_SHA}" && \
              pip install -e . --no-deps && \
              echo "=== ATOM version AFTER installation ===" && pip show atom || true
          RUN pip show amd-aiter atom sglang torch triton mori || true
          EOF

      - name: Resolve SGLANG CI build mode
        id: build_mode
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' }}
        run: |
          set -euo pipefail
          echo "build_mode=full" >> "$GITHUB_OUTPUT"

          if ! docker pull "${NIGHTLY_SGLANG_IMAGE_TAG}"; then
            echo "Unable to pull ${NIGHTLY_SGLANG_IMAGE_TAG}; falling back to a full SGLang rebuild."
            exit 0
          fi

          echo "Inspecting ${NIGHTLY_SGLANG_IMAGE_TAG} labels before deciding whether to reuse it."
          docker inspect --format 'Image ID: {{.Id}}' "${NIGHTLY_SGLANG_IMAGE_TAG}" || true
          docker inspect --format 'Image labels: {{json .Config.Labels}}' "${NIGHTLY_SGLANG_IMAGE_TAG}" || true
          LATEST_SGLANG_REF="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.sglang_ref" }}' "${NIGHTLY_SGLANG_IMAGE_TAG}" 2>/dev/null || true)"
          echo "Expected SGLang commit label: ${SGLANG_REF}"
          echo "Resolved ${NIGHTLY_SGLANG_IMAGE_TAG} label com.rocm.atom.sglang_ref: ${LATEST_SGLANG_REF:-<missing>}"
          if [ -n "${LATEST_SGLANG_REF}" ] && [ "${LATEST_SGLANG_REF}" = "${SGLANG_REF}" ]; then
            echo "build_mode=fast" >> "$GITHUB_OUTPUT"
            echo "Reusing ${NIGHTLY_SGLANG_IMAGE_TAG} as the SGLANG CI base (SGLang commit ${LATEST_SGLANG_REF})."
          else
            echo "SGLANG CI latest image label mismatch or missing. Expected ${SGLANG_REF}, got ${LATEST_SGLANG_REF:-<missing>}; rebuilding SGLang."
          fi

      - name: Build SGLANG overlay image from reusable latest
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' && steps.build_mode.outputs.build_mode == 'fast' }}
        run: |
          DOCKER_BUILDKIT=1 docker build --network=host \
            -t atom_sglang:ci \
            --build-arg SGLANG_BASE_IMAGE="${NIGHTLY_SGLANG_IMAGE_TAG}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

      - name: Build SGLANG overlay base image
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' && steps.build_mode.outputs.build_mode != 'fast' }}
        run: |
          DOCKER_BUILDKIT=1 docker build --pull --network=host \
            --no-cache \
            -t atom_sglang_base:ci \
            --build-arg SGLANG_BASE_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

      - name: Build SGLANG SGLang image
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' && steps.build_mode.outputs.build_mode != 'fast' }}
        run: |
          DOCKER_BUILDKIT=1 docker build --network=host \
            --no-cache \
            -t atom_sglang:ci \
            --target atom_sglang \
            --build-arg SGLANG_BASE_IMAGE="atom_sglang_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Push Docker image
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && steps.existing_sglang_image.outputs.image_exists != 'true' }}
        run: |
          docker tag atom_sglang:ci "${SGLANG_IMAGE_TAG}"
          docker push "${SGLANG_IMAGE_TAG}"

      - name: Skip remote build for fork PR
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          echo "Fork PRs build the SGLANG image locally on each test runner."

      - name: Clean up build images
        if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && always() }}
        run: |
          rm -f Dockerfile.mod || true
          docker rmi "atom_sglang_base:ci" || true
          docker rmi "atom_sglang:ci" || true
          docker rmi "${SGLANG_IMAGE_TAG}" || true

  atom-sglang-accuracy:
    needs: [check-signal, download_aiter_wheel, build_sglang_image]
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false }}
    name: Accuracy (${{ matrix.model_name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_name: "DeepSeek-R1-FP8 TP4"
            model_path: "deepseek-ai/DeepSeek-R1-0528"
            extra_args: "--tensor-parallel-size 4"
            env_vars: |
              AITER_QUICK_REDUCE_QUANTIZATION=INT4
              SGLANG_AITER_FP8_PREFILL_ATTN=0
              SGLANG_USE_AITER=1
              ATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1
            accuracy_test_threshold: 0.92
            runner: linux-atom-mi35x-4
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      CONTAINER_NAME: atom_sglang_${{ strategy.job-index }}
      SGLANG_REF: v0.5.10
      AITER_ARTIFACT_ID: ${{ needs.download_aiter_wheel.outputs.aiter_artifact_id }}

    steps:
      - name: Clean up containers and workspace
        if: matrix.runner == 'atom-mi355-8gpu.predownload'
        run: |
          echo "=== Cleaning up containers on $(hostname) ==="
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run --rm -v "${GITHUB_WORKSPACE:-$PWD}":/workspace -w /workspace --privileged rocm/pytorch:latest bash -lc "ls -la /workspace/ && find /workspace -mindepth 1 -delete" || true

      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> $GITHUB_ENV

      - name: Docker Login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Download aiter wheel
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        uses: actions/download-artifact@v4
        with:
          name: aiter-whl
          path: aiter-whl

      - name: Generate SGLANG overlay Dockerfile for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          cat <<'EOF' > Dockerfile.mod
          ARG SGLANG_BASE_IMAGE
          FROM ${SGLANG_BASE_IMAGE}
          ARG GITHUB_REPO_URL
          ARG GITHUB_COMMIT_SHA
          ARG SGLANG_REF
          ARG AITER_ARTIFACT_ID
          ARG INSTALL_LM_EVAL=1
          LABEL com.rocm.atom.sglang_ref="${SGLANG_REF}"
          LABEL com.rocm.atom.aiter_artifact_id="${AITER_ARTIFACT_ID}"
          COPY aiter-whl/ /tmp/aiter-whl/
          RUN if [ "${INSTALL_LM_EVAL}" = "1" ]; then pip install -U "lm-eval[api]"; else echo "Skip lm-eval install"; fi
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true && \
              pip uninstall -y amd-aiter || true && \
              rm -rf /app/aiter-test && \
              AITER_WHL="$(ls -t /tmp/aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)" && \
              if [ -z "${AITER_WHL}" ]; then echo "ERROR: No amd_aiter wheel found under /tmp/aiter-whl"; ls -la /tmp/aiter-whl || true; exit 1; fi && \
              pip install "${AITER_WHL}" && \
              echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true && \
              rm -rf /tmp/aiter-whl
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true && \
              pip uninstall -y atom || true && \
              rm -rf /app/ATOM && \
              git clone "${GITHUB_REPO_URL}" /app/ATOM && \
              cd /app/ATOM && \
              git checkout "${GITHUB_COMMIT_SHA}" && \
              pip install -e . --no-deps && \
              echo "=== ATOM version AFTER installation ===" && pip show atom || true
          RUN pip show amd-aiter atom sglang torch triton mori || true
          EOF

      - name: Build SGLANG image for forked repo
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          set -euo pipefail
          docker rmi "atom_sglang_base:ci" || true
          docker rmi "atom_sglang:ci" || true

          BUILD_MODE="full"
          if ! docker pull "${NIGHTLY_SGLANG_IMAGE_TAG}"; then
            echo "Unable to pull ${NIGHTLY_SGLANG_IMAGE_TAG}; rebuilding SGLang locally."
          else
            echo "Inspecting ${NIGHTLY_SGLANG_IMAGE_TAG} labels before deciding whether to reuse it locally."
            docker inspect --format 'Image ID: {{.Id}}' "${NIGHTLY_SGLANG_IMAGE_TAG}" || true
            docker inspect --format 'Image labels: {{json .Config.Labels}}' "${NIGHTLY_SGLANG_IMAGE_TAG}" || true
            LATEST_SGLANG_REF="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.sglang_ref" }}' "${NIGHTLY_SGLANG_IMAGE_TAG}" 2>/dev/null || true)"
            echo "Expected SGLang commit label: ${SGLANG_REF}"
            echo "Resolved ${NIGHTLY_SGLANG_IMAGE_TAG} label com.rocm.atom.sglang_ref: ${LATEST_SGLANG_REF:-<missing>}"
            if [ -n "${LATEST_SGLANG_REF}" ] && [ "${LATEST_SGLANG_REF}" = "${SGLANG_REF}" ]; then
              BUILD_MODE="fast"
              echo "Reusing ${NIGHTLY_SGLANG_IMAGE_TAG} locally for fork PR SGLANG CI."
            else
              echo "SGLANG CI latest image label mismatch or missing. Expected ${SGLANG_REF}, got ${LATEST_SGLANG_REF:-<missing>}; rebuilding SGLang locally."
            fi
          fi

          if [ "${BUILD_MODE}" = "fast" ]; then
            DOCKER_BUILDKIT=1 docker build --network=host \
              -t atom_sglang:ci \
              --build-arg SGLANG_BASE_IMAGE="${NIGHTLY_SGLANG_IMAGE_TAG}" \
              --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
              --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
              --build-arg SGLANG_REF="${SGLANG_REF}" \
              --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
              --build-arg INSTALL_LM_EVAL=1 \
              -f Dockerfile.mod .
            exit 0
          fi

          DOCKER_BUILDKIT=1 docker build --pull --network=host \
            --no-cache \
            -t atom_sglang_base:ci \
            --build-arg SGLANG_BASE_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

          DOCKER_BUILDKIT=1 docker build --network=host \
            --no-cache \
            -t atom_sglang:ci \
            --target atom_sglang \
            --build-arg SGLANG_BASE_IMAGE="atom_sglang_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Set SGLANG image tag
        env:
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          if [ "${IS_FORK_PR}" = "true" ]; then
            echo "SGLANG_IMAGE_TAG=atom_sglang:ci" >> "$GITHUB_ENV"
          else
            echo "SGLANG_IMAGE_TAG=rocm/atom-dev:sglang-pre-build-${GITHUB_COMMIT_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Pull SGLANG image
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          docker pull "${SGLANG_IMAGE_TAG}"

      - name: Prepare model cache mount
        run: |
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models" ]; then
            MODEL_CACHE_MOUNT="-v /models:/models"
            MODEL_CACHE_DESC="/models (host mount)"
          else
            echo "Warning: /models directory not found on runner; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Start SGLANG test container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --name "$CONTAINER_NAME" \
            "$SGLANG_IMAGE_TAG"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model if needed
        if: success()
        run: |
          set -euo pipefail
          model_dir="/models/${{ matrix.model_path }}"
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            lock_suffix="$(printf '%s' "${{ matrix.model_path }}" | tr '/:@' '___')"
            if ! docker exec \
              -e HF_TOKEN="${HF_TOKEN:-}" \
              -e MODEL_PATH="${{ matrix.model_path }}" \
              -e MODEL_DIR="$model_dir" \
              -e RUNNER_NAME="${{ matrix.runner }}" \
              -e LOCK_SUFFIX="$lock_suffix" \
              "$CONTAINER_NAME" \
              bash -lc '
                set -euo pipefail
                completion_flag="$MODEL_DIR/.download-complete"
                use_model_lock="true"

                if [ "$RUNNER_NAME" = "atom-mi355-8gpu.predownload" ]; then
                  use_model_lock="false"
                fi

                download_model() {
                  if [ -f "$MODEL_DIR/config.json" ]; then
                    echo "Model directory exists without a completion marker under ${MODEL_DIR}; validating download"
                  else
                    echo "Model not found under ${MODEL_DIR}; downloading model"
                  fi

                  rm -f "$completion_flag"
                  hf download "$MODEL_PATH" --local-dir "$MODEL_DIR"
                  touch "$completion_flag"
                }

                if [ -f "$completion_flag" ]; then
                  echo "Model already exists under ${MODEL_DIR}; skip download"
                elif [ "$use_model_lock" != "true" ]; then
                  echo "Baremetal runner ${RUNNER_NAME} detected; skipping shared model download lock"
                  download_model
                else
                  lock_dir="/models/.cache/atom-download-locks"
                  mkdir -p "$lock_dir"
                  lock_file="$lock_dir/${LOCK_SUFFIX}.lock"
                  exec 9>"$lock_file"
                  echo "Waiting for model download lock: $lock_file"
                  if ! flock -w 7200 9; then
                    echo "Timed out waiting for model download lock: $lock_file"
                    exit 1
                  fi

                  if [ -f "$completion_flag" ]; then
                    echo "Model became available under ${MODEL_DIR} while waiting for the lock; skip download"
                  else
                    download_model
                  fi
                fi
              '; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          else
            echo "/models directory not mounted; skipping model download"
          fi

      - name: Resolve SGLANG model path
        if: success()
        run: |
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            echo "SGLANG_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using mounted model path: /models/${{ matrix.model_path }}"
          else
            echo "SGLANG_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run SGLANG launch and gsm8k accuracy via script (ci mode)
        if: success()
        timeout-minutes: 120
        env:
          SGLANG_MODEL_NAME: ${{ matrix.model_name }}
          SGLANG_MODEL_PATH: ${{ matrix.model_path }}
          SGLANG_EXTRA_ARGS: ${{ matrix.extra_args }}
          SGLANG_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_SGLANG_LOGS: "1"
          LM_EVAL_TASK: "gsm8k"
        run: |
          docker exec \
            -e SGLANG_MODEL_NAME="${SGLANG_MODEL_NAME}" \
            -e SGLANG_MODEL_PATH="${SGLANG_RESOLVED_MODEL_PATH:-$SGLANG_MODEL_PATH}" \
            -e SGLANG_EXTRA_ARGS="${SGLANG_EXTRA_ARGS}" \
            -e SGLANG_ENV_VARS="${SGLANG_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_SGLANG_LOGS="${STREAM_SGLANG_LOGS}" \
            -e LM_EVAL_TASK="${LM_EVAL_TASK}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_sglang_test.sh accuracy
            "

      - name: Check SGLANG accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true
          result_file=$(ls -1t atom_sglang_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in atom_sglang_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect SGLANG accuracy summary
        if: success()
        run: |
          echo "SGLANG Accuracy Test Summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/atom_sglang_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect SGLANG logs and results
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang.log ./atom_sglang.log || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_output.txt ./atom_sglang_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true

      - name: Upload SGLANG artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sglang-${{ matrix.model_name }}-artifacts
          path: |
            atom_sglang.log
            atom_sglang_accuracy_output.txt
            atom_sglang_accuracy_results

      - name: Clean up SGLANG test
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/atom_sglang.pid ]; then kill \$(cat /tmp/atom_sglang.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          rm -f Dockerfile.mod || true
          docker rmi "atom_sglang_base:ci" || true
          docker rmi "atom_sglang:ci" || true
          KEEP_COUNT="${SGLANG_IMAGE_CACHE_KEEP:-3}"
          if [[ "${SGLANG_IMAGE_TAG}" == rocm/atom-dev:sglang-pre-build-* ]]; then
            echo "Keeping current SGLANG image tag and the ${KEEP_COUNT} most recent sglang-pre-build tags."
            mapfile -t OLD_SGLANG_TAGS < <(
              docker image ls --filter=reference='rocm/atom-dev:sglang-pre-build-*' --format '{{.Repository}}:{{.Tag}}' \
                | while read -r tag; do
                    [ -n "${tag}" ] || continue
                    created_at=$(docker image inspect --format '{{.Created}}' "${tag}" 2>/dev/null || true)
                    [ -n "${created_at}" ] && printf '%s %s\n' "${created_at}" "${tag}"
                  done \
                | sort -r \
                | awk -v keep="${KEEP_COUNT}" 'NR > keep { print $2 }'
            )
            for tag in "${OLD_SGLANG_TAGS[@]}"; do
              if [ "${tag}" = "${SGLANG_IMAGE_TAG}" ]; then
                continue
              fi
              echo "Removing old SGLANG image tag: ${tag}"
              docker rmi "${tag}" || true
            done
          fi

