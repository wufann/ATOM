<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820">
  <title>ATOM vLLM Plugin Architecture Stack</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="gVllm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="100%" stop-color="#fdf0c8"/>
    </linearGradient>
    <linearGradient id="badgeVllm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdb515"/>
      <stop offset="100%" stop-color="#30a2ff"/>
    </linearGradient>
    <linearGradient id="gAtom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="100%" stop-color="#ede5ff"/>
    </linearGradient>
    <linearGradient id="badgeAtom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gAiter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="badgeAiter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gAmd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fde8e8"/>
    </linearGradient>
    <linearGradient id="badgeAmd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ED1C24"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="cardShadow" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="960" height="820" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">ATOM vLLM Plugin Architecture</text>
  <text x="480" y="62" text-anchor="middle" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">From user-facing API to AMD silicon</text>

  <!-- ====== LAYER 1: vLLM ====== -->
  <rect x="40" y="82" width="880" height="150" rx="12" fill="url(#gVllm)" stroke="#fcd34d" stroke-width="1" filter="url(#ds)"/>

  <g transform="translate(56,90)">
    <rect width="26" height="26" rx="6" fill="url(#badgeVllm)"/>
    <path d="M6,8 L13,20 L20,8" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect x="88" y="94" width="72" height="22" rx="5" fill="url(#badgeVllm)"/>
  <text x="124" y="110" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">vLLM</text>
  <text x="172" y="110" fill="#b45309" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Framework Runtime</text>

  <rect x="56" y="126" width="200" height="48" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="72" y="146" fill="#78350f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Request Scheduling</text>
  <text x="72" y="164" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Continuous batching, preemption</text>

  <rect x="272" y="126" width="200" height="48" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="288" y="146" fill="#78350f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">KV Cache Management</text>
  <text x="288" y="164" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Block alloc, paging, prefix caching</text>

  <rect x="488" y="126" width="200" height="48" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="504" y="146" fill="#78350f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">OpenAI-Compatible API</text>
  <text x="504" y="164" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">/v1/completions, /v1/chat, streaming</text>

  <rect x="704" y="126" width="200" height="48" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="720" y="146" fill="#78350f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">CUDAGraph &amp; Compile</text>
  <text x="720" y="164" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Graph capture, replay, piecewise</text>

  <text x="56" y="218" fill="#d97706" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-style="italic">vllm serve -- zero changes needed</text>

  <!-- Arrow 1-2 -->
  <line x1="480" y1="236" x2="480" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <path d="M476,257 L480,265 L484,257" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="494" y="254" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="500">entry_points</text>

  <!-- ====== LAYER 2: ATOM Plugin ====== -->
  <rect x="40" y="270" width="880" height="150" rx="12" fill="url(#gAtom)" stroke="#d8b4fe" stroke-width="1" filter="url(#ds)"/>

  <g transform="translate(56,278)">
    <rect width="26" height="26" rx="6" fill="url(#badgeAtom)"/>
    <circle cx="13" cy="13" r="3" fill="#ffffff"/>
    <ellipse cx="13" cy="13" rx="9" ry="4" fill="none" stroke="#ffffff" stroke-width="1.2" transform="rotate(-30,13,13)"/>
    <ellipse cx="13" cy="13" rx="9" ry="4" fill="none" stroke="#ffffff" stroke-width="1.2" transform="rotate(30,13,13)"/>
  </g>
  <rect x="88" y="282" width="114" height="22" rx="5" fill="url(#badgeAtom)"/>
  <text x="145" y="298" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">ATOM Plugin</text>
  <text x="214" y="298" fill="#7c3aed" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Plugin Backend &amp; Model Implementation</text>

  <rect x="56" y="314" width="268" height="44" rx="8" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="72" y="332" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Platform Registration</text>
  <text x="72" y="348" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">ATOMPlatform: overrides attention backend</text>

  <rect x="340" y="314" width="268" height="44" rx="8" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="356" y="332" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Model Wrapper &amp; Config</text>
  <text x="356" y="348" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">ATOMModelBase: VllmConfig to ATOM Config</text>

  <rect x="624" y="314" width="280" height="44" rx="8" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="640" y="332" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Attention Backends</text>
  <text x="640" y="348" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">AiterBackend (MHA) / AiterMLABackend (MLA)</text>

  <rect x="56" y="366" width="268" height="44" rx="8" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="72" y="384" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Model Implementations</text>
  <text x="72" y="400" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Qwen3, DeepSeek V3, GPT-OSS, GLM-4, Kimi-K2</text>

  <rect x="340" y="366" width="268" height="44" rx="8" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="356" y="384" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Weight Loading</text>
  <text x="356" y="400" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">load_model_in_plugin_mode(), FP8/FP4</text>

  <rect x="624" y="366" width="280" height="44" rx="8" fill="#ffffff" stroke="#d8b4fe" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="640" y="384" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Metadata Builders</text>
  <text x="640" y="400" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Decorator-based transform, CUDAGraph compat</text>

  <!-- Arrow 2-3 -->
  <line x1="480" y1="424" x2="480" y2="448" stroke="#64748b" stroke-width="1.5"/>
  <path d="M476,445 L480,453 L484,445" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="494" y="442" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="500">kernel calls</text>

  <!-- ====== LAYER 3: AITER ====== -->
  <rect x="40" y="458" width="880" height="150" rx="12" fill="url(#gAiter)" stroke="#6ee7b7" stroke-width="1" filter="url(#ds)"/>

  <g transform="translate(56,466)">
    <rect width="26" height="26" rx="6" fill="url(#badgeAiter)"/>
    <path d="M15,5 L10,13 L14,13 L11,21 L18,12 L14,12 L17,5 Z" fill="#ffffff"/>
  </g>
  <rect x="88" y="470" width="76" height="22" rx="5" fill="url(#badgeAiter)"/>
  <text x="126" y="486" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">AITER</text>
  <text x="176" y="486" fill="#059669" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">GPU Kernel Library</text>

  <rect x="56" y="504" width="162" height="48" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="72" y="524" fill="#064e3b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Flash Attention</text>
  <text x="72" y="542" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Paged decode, chunked prefill</text>

  <rect x="234" y="504" width="162" height="48" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="250" y="524" fill="#064e3b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Fused MoE</text>
  <text x="250" y="542" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Expert routing, gating</text>

  <rect x="412" y="504" width="162" height="48" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="428" y="524" fill="#064e3b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Quantized GEMM</text>
  <text x="428" y="542" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">FP8, FP4 (MXFP4), batched</text>

  <rect x="590" y="504" width="162" height="48" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="606" y="524" fill="#064e3b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">RoPE+Cache Fusion</text>
  <text x="606" y="542" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">QK-norm+RoPE+cache+quant</text>

  <rect x="768" y="504" width="136" height="48" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="784" y="524" fill="#064e3b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">AllReduce</text>
  <text x="784" y="542" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">TP/EP collectives</text>

  <text x="56" y="590" fill="#34d399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-style="italic">Triton and HIP kernels optimized for AMD CDNA architecture</text>

  <!-- Arrow 3-4 -->
  <line x1="480" y1="612" x2="480" y2="636" stroke="#64748b" stroke-width="1.5"/>
  <path d="M476,633 L480,641 L484,633" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="494" y="630" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="500">HIP / ROCm</text>

  <!-- ====== LAYER 4: AMD Hardware ====== -->
  <rect x="40" y="646" width="880" height="150" rx="12" fill="url(#gAmd)" stroke="#fca5a5" stroke-width="1" filter="url(#ds)"/>

  <g transform="translate(56,654)">
    <rect width="26" height="26" rx="6" fill="url(#badgeAmd)"/>
    <text x="13" y="19" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="800">AMD</text>
  </g>
  <rect x="88" y="658" width="138" height="22" rx="5" fill="url(#badgeAmd)"/>
  <text x="157" y="674" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">AMD Hardware</text>
  <text x="238" y="674" fill="#dc2626" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Instinct GPU Accelerators</text>

  <rect x="56" y="694" width="268" height="48" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="72" y="714" fill="#7f1d1d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">MI300X / CDNA 3 (gfx942)</text>
  <text x="72" y="732" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">192 GB HBM3, 5.3 TB/s bandwidth</text>

  <rect x="340" y="694" width="268" height="48" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="356" y="714" fill="#7f1d1d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">MI355X / CDNA 4 (gfx950)</text>
  <text x="356" y="732" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">288 GB HBM3e, Native FP4, 8 TB/s</text>

  <rect x="624" y="694" width="280" height="48" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="640" y="714" fill="#7f1d1d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">MI400 / Next-Gen</text>
  <text x="640" y="732" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10">Rack-scale interconnect, ultra-high BW</text>

  <text x="56" y="782" fill="#f87171" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-style="italic">ROCm platform: HIP runtime, hipBLAS, RCCL</text>
</svg>
