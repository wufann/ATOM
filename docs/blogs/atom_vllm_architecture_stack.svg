<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820">
  <title>ATOM vLLM Plugin Architecture Stack</title>
  <defs>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" rx="16" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#1a1a2e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">ATOM vLLM Plugin Architecture</text>
  <text x="480" y="66" text-anchor="middle" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400">Layered responsibility model: from user-facing API to AMD silicon</text>

  <!-- ====== LAYER 1: vLLM (Blue) height 150 ====== -->
  <rect x="40" y="86" width="880" height="150" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="56" y="98" width="72" height="28" rx="6" fill="#3b82f6"/>
  <text x="92" y="118" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">vLLM</text>
  <text x="142" y="118" fill="#3b82f6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Framework Runtime</text>

  <rect x="56" y="136" width="200" height="48" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="1"/>
  <text x="72" y="156" fill="#1e3a5f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Request Scheduling</text>
  <text x="72" y="174" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Continuous batching, preemption</text>

  <rect x="272" y="136" width="200" height="48" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="1"/>
  <text x="288" y="156" fill="#1e3a5f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">KV Cache Management</text>
  <text x="288" y="174" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Block alloc, paging, prefix caching</text>

  <rect x="488" y="136" width="200" height="48" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="1"/>
  <text x="504" y="156" fill="#1e3a5f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">OpenAI-Compatible API</text>
  <text x="504" y="174" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">/v1/completions, /v1/chat, streaming</text>

  <rect x="704" y="136" width="200" height="48" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="1"/>
  <text x="720" y="156" fill="#1e3a5f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">CUDAGraph &amp; Compile</text>
  <text x="720" y="174" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Graph capture, replay, piecewise</text>

  <text x="56" y="222" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-style="italic">Users run: vllm serve -- zero changes needed</text>

  <!-- Arrow 1 to 2 -->
  <line x1="480" y1="238" x2="480" y2="260" stroke="#d1d5db" stroke-width="2"/>
  <polygon points="474,256 480,268 486,256" fill="#d1d5db"/>
  <text x="500" y="258" fill="#9ca3af" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="500">plugin hooks</text>

  <!-- ====== LAYER 2: ATOM Plugin (Purple) height 150 ====== -->
  <rect x="40" y="272" width="880" height="150" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="56" y="282" width="120" height="28" rx="6" fill="#8b5cf6"/>
  <text x="116" y="302" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">ATOM Plugin</text>
  <text x="190" y="302" fill="#8b5cf6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">OOT Backend &amp; Model Optimization</text>

  <!-- Row 1 -->
  <rect x="56" y="318" width="268" height="44" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="72" y="336" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Platform Registration</text>
  <text x="72" y="352" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">ATOMPlatform: overrides attention backend</text>

  <rect x="340" y="318" width="268" height="44" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="356" y="336" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Model Wrapper &amp; Config</text>
  <text x="356" y="352" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">ATOMModelBase: VllmConfig to ATOM Config</text>

  <rect x="624" y="318" width="280" height="44" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="640" y="336" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Attention Backends</text>
  <text x="640" y="352" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">AiterBackend (MHA) / AiterMLABackend (MLA)</text>

  <!-- Row 2 -->
  <rect x="56" y="370" width="268" height="44" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="72" y="388" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Model Implementations</text>
  <text x="72" y="404" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Qwen3, DeepSeek V3, GPT-OSS, GLM-4, Kimi-K2</text>

  <rect x="340" y="370" width="268" height="44" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="356" y="388" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Weight Loading</text>
  <text x="356" y="404" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">load_model_in_plugin_mode(), FP8/FP4</text>

  <rect x="624" y="370" width="280" height="44" rx="8" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="640" y="388" fill="#3b1f6e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Metadata Builders</text>
  <text x="640" y="404" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Decorator-based transform, CUDAGraph compat</text>

  <!-- Arrow 2 to 3 -->
  <line x1="480" y1="424" x2="480" y2="446" stroke="#d1d5db" stroke-width="2"/>
  <polygon points="474,442 480,454 486,442" fill="#d1d5db"/>
  <text x="500" y="444" fill="#9ca3af" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="500">kernel calls</text>

  <!-- ====== LAYER 3: AITER (Green) height 150 ====== -->
  <rect x="40" y="458" width="880" height="150" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="56" y="470" width="80" height="28" rx="6" fill="#22c55e"/>
  <text x="96" y="490" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">AITER</text>
  <text x="150" y="490" fill="#22c55e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">GPU Kernel Library</text>

  <rect x="56" y="510" width="162" height="48" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="72" y="530" fill="#14532d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Flash Attention</text>
  <text x="72" y="548" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Paged decode, chunked prefill</text>

  <rect x="234" y="510" width="162" height="48" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="250" y="530" fill="#14532d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Fused MoE</text>
  <text x="250" y="548" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Expert routing, gating</text>

  <rect x="412" y="510" width="162" height="48" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="428" y="530" fill="#14532d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Quantized GEMM</text>
  <text x="428" y="548" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">FP8, FP4 (MXFP4), batched</text>

  <rect x="590" y="510" width="162" height="48" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="606" y="530" fill="#14532d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">RoPE+Cache Fusion</text>
  <text x="606" y="548" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">QK-norm+RoPE+cache+quant</text>

  <rect x="768" y="510" width="136" height="48" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="784" y="530" fill="#14532d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">AllReduce</text>
  <text x="784" y="548" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">TP/EP collectives</text>

  <text x="56" y="594" fill="#86efac" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-style="italic">Triton and HIP kernels optimized for AMD CDNA architecture</text>

  <!-- Arrow 3 to 4 -->
  <line x1="480" y1="610" x2="480" y2="632" stroke="#d1d5db" stroke-width="2"/>
  <polygon points="474,628 480,640 486,628" fill="#d1d5db"/>
  <text x="500" y="630" fill="#9ca3af" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="500">HIP / ROCm</text>

  <!-- ====== LAYER 4: AMD Hardware (Red) height 150 ====== -->
  <rect x="40" y="644" width="880" height="150" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="56" y="656" width="148" height="28" rx="6" fill="#ef4444"/>
  <text x="130" y="676" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">AMD Hardware</text>
  <text x="218" y="676" fill="#ef4444" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Instinct GPU Accelerators</text>

  <rect x="56" y="696" width="268" height="48" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="72" y="716" fill="#7f1d1d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">MI300X / CDNA 3 (gfx942)</text>
  <text x="72" y="734" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">192 GB HBM3, 5.3 TB/s bandwidth</text>

  <rect x="340" y="696" width="268" height="48" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="356" y="716" fill="#7f1d1d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">MI355X / CDNA 4 (gfx950)</text>
  <text x="356" y="734" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">288 GB HBM3e, Native FP4, 8 TB/s</text>

  <rect x="624" y="696" width="280" height="48" rx="8" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="640" y="716" fill="#7f1d1d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">MI400 / Next-Gen</text>
  <text x="640" y="734" fill="#6b7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11">Rack-scale interconnect, ultra-high BW</text>

  <text x="56" y="780" fill="#fca5a5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-style="italic">ROCm platform: HIP runtime, hipBLAS, RCCL</text>
</svg>
