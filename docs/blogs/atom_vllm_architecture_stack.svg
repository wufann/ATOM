<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="920" viewBox="0 0 1100 920">
  <title>ATOM vLLM Plugin Architecture Stack</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#101a31"/>
    </linearGradient>
    <linearGradient id="layerBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#132440"/>
      <stop offset="100%" stop-color="#1e375a"/>
    </linearGradient>
    <linearGradient id="layerViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c1c3f"/>
      <stop offset="100%" stop-color="#372350"/>
    </linearGradient>
    <linearGradient id="layerGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#102d26"/>
      <stop offset="100%" stop-color="#163c32"/>
    </linearGradient>
    <linearGradient id="layerRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3c1414"/>
      <stop offset="100%" stop-color="#501c1c"/>
    </linearGradient>
    <linearGradient id="hdrBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63cfff"/>
      <stop offset="100%" stop-color="#4c91ff"/>
    </linearGradient>
    <linearGradient id="hdrViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d17cff"/>
      <stop offset="100%" stop-color="#8c6bff"/>
    </linearGradient>
    <linearGradient id="hdrGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#72edc0"/>
      <stop offset="100%" stop-color="#3db88a"/>
    </linearGradient>
    <linearGradient id="hdrRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#e04040"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020816" flood-opacity="0.5"/>
    </filter>
    <marker id="ad" markerWidth="12" markerHeight="12" refX="6" refY="10" orient="auto">
      <path d="M1,1 L6,10 L11,1" fill="none" stroke="#556680" stroke-width="2"/>
    </marker>
  </defs>

  <rect width="1100" height="920" fill="url(#bg)"/>
  <circle cx="100" cy="80" r="160" fill="#0a1a2e" opacity="0.5"/>
  <circle cx="1000" cy="850" r="200" fill="#1a0e0e" opacity="0.4"/>
  <circle cx="950" cy="200" r="180" fill="#150e22" opacity="0.4"/>

  <text x="50" y="52" fill="#f6fbff" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">ATOM vLLM Plugin Architecture</text>
  <text x="50" y="78" fill="#b1c0d9" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500">Layered responsibility model: from user-facing API to AMD silicon</text>

  <!-- LAYER 1: vLLM -->
  <rect x="50" y="100" width="1000" height="160" rx="22" fill="url(#layerBlue)" stroke="#3a6090" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="70" y="112" width="120" height="32" rx="10" fill="url(#hdrBlue)" filter="url(#sh)"/>
  <text x="130" y="134" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">vLLM</text>
  <text x="210" y="134" fill="#b0c8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Framework Runtime</text>

  <rect x="70" y="152" width="220" height="52" rx="14" fill="#0e1626" stroke="#2a3a55" stroke-width="1.2"/>
  <text x="86" y="174" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Request Scheduling</text>
  <text x="86" y="192" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Continuous batching, preemption</text>

  <rect x="310" y="152" width="220" height="52" rx="14" fill="#0e1626" stroke="#2a3a55" stroke-width="1.2"/>
  <text x="326" y="174" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">KV Cache Management</text>
  <text x="326" y="192" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Block allocation, paging, prefix caching</text>

  <rect x="550" y="152" width="220" height="52" rx="14" fill="#0e1626" stroke="#2a3a55" stroke-width="1.2"/>
  <text x="566" y="174" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">OpenAI-Compatible API</text>
  <text x="566" y="192" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">/v1/completions, /v1/chat, streaming</text>

  <rect x="790" y="152" width="240" height="52" rx="14" fill="#0e1626" stroke="#2a3a55" stroke-width="1.2"/>
  <text x="806" y="174" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">CUDAGraph &amp; Compilation</text>
  <text x="806" y="192" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Graph capture, replay, piecewise compile</text>

  <text x="70" y="240" fill="#4a8abf" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic">Users run: vllm serve -- no changes needed</text>

  <line x1="550" y1="262" x2="550" y2="290" stroke="#556680" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#ad)"/>
  <text x="590" y="280" fill="#667a95" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">plugin hooks</text>

  <!-- LAYER 2: ATOM Plugin -->
  <rect x="50" y="295" width="1000" height="190" rx="22" fill="url(#layerViolet)" stroke="#5a3d80" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="70" y="307" width="180" height="32" rx="10" fill="url(#hdrViolet)" filter="url(#sh)"/>
  <text x="160" y="329" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">ATOM Plugin</text>
  <text x="270" y="329" fill="#c0a8e0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">OOT Backend &amp; Model Optimization</text>

  <rect x="70" y="350" width="290" height="52" rx="14" fill="#0e1626" stroke="#3a2a55" stroke-width="1.2"/>
  <text x="86" y="372" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Platform Registration</text>
  <text x="86" y="390" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">ATOMPlatform: overrides attention backend</text>

  <rect x="380" y="350" width="290" height="52" rx="14" fill="#0e1626" stroke="#3a2a55" stroke-width="1.2"/>
  <text x="396" y="372" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Model Registration &amp; Wrapper</text>
  <text x="396" y="390" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">ATOMModelBase: config, weight loading</text>

  <rect x="690" y="350" width="340" height="52" rx="14" fill="#0e1626" stroke="#3a2a55" stroke-width="1.2"/>
  <text x="706" y="372" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Attention Backends</text>
  <text x="706" y="390" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">AiterBackend (MHA) / AiterMLABackend (MLA)</text>

  <rect x="70" y="414" width="290" height="52" rx="14" fill="#0e1626" stroke="#3a2a55" stroke-width="1.2"/>
  <text x="86" y="436" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Model Implementations</text>
  <text x="86" y="454" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Qwen3, DeepSeek V3, GPT-OSS, GLM-4, Kimi-K2</text>

  <rect x="380" y="414" width="290" height="52" rx="14" fill="#0e1626" stroke="#3a2a55" stroke-width="1.2"/>
  <text x="396" y="436" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Config Translation</text>
  <text x="396" y="454" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">VllmConfig to ATOM Config, compile policies</text>

  <rect x="690" y="414" width="340" height="52" rx="14" fill="#0e1626" stroke="#3a2a55" stroke-width="1.2"/>
  <text x="706" y="436" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Metadata Builders</text>
  <text x="706" y="454" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Decorator-based class transform, CUDAGraph compat</text>

  <line x1="550" y1="487" x2="550" y2="515" stroke="#556680" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#ad)"/>
  <text x="590" y="505" fill="#667a95" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">kernel calls</text>

  <!-- LAYER 3: AITER -->
  <rect x="50" y="520" width="1000" height="160" rx="22" fill="url(#layerGreen)" stroke="#2a6050" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="70" y="532" width="120" height="32" rx="10" fill="url(#hdrGreen)" filter="url(#sh)"/>
  <text x="130" y="554" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">AITER</text>
  <text x="210" y="554" fill="#90d8b8" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">GPU Kernel Library</text>

  <rect x="70" y="574" width="180" height="52" rx="14" fill="#0e1626" stroke="#1e4038" stroke-width="1.2"/>
  <text x="86" y="596" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Flash Attention</text>
  <text x="86" y="614" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Paged decode, chunked prefill</text>

  <rect x="268" y="574" width="180" height="52" rx="14" fill="#0e1626" stroke="#1e4038" stroke-width="1.2"/>
  <text x="284" y="596" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Fused MoE</text>
  <text x="284" y="614" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Expert routing, MORI comm</text>

  <rect x="466" y="574" width="180" height="52" rx="14" fill="#0e1626" stroke="#1e4038" stroke-width="1.2"/>
  <text x="482" y="596" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Quantized GEMM</text>
  <text x="482" y="614" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">FP8, FP4 (MXFP4), batched</text>

  <rect x="664" y="574" width="180" height="52" rx="14" fill="#0e1626" stroke="#1e4038" stroke-width="1.2"/>
  <text x="680" y="596" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">RoPE + Cache Fusion</text>
  <text x="680" y="614" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">QK-norm+RoPE+cache+quant</text>

  <rect x="862" y="574" width="168" height="52" rx="14" fill="#0e1626" stroke="#1e4038" stroke-width="1.2"/>
  <text x="878" y="596" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Custom AllReduce</text>
  <text x="878" y="614" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">TP/EP collectives</text>

  <text x="70" y="660" fill="#3a9070" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic">Triton and HIP kernels optimized for AMD CDNA architecture</text>

  <line x1="550" y1="682" x2="550" y2="710" stroke="#556680" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#ad)"/>
  <text x="590" y="700" fill="#667a95" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">HIP / ROCm</text>

  <!-- LAYER 4: AMD Hardware -->
  <rect x="50" y="715" width="1000" height="170" rx="22" fill="url(#layerRed)" stroke="#803030" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="70" y="727" width="200" height="32" rx="10" fill="url(#hdrRed)" filter="url(#sh)"/>
  <text x="170" y="749" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">AMD Hardware</text>
  <text x="290" y="749" fill="#e0a0a0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Instinct GPU Accelerators</text>

  <rect x="70" y="770" width="290" height="52" rx="14" fill="#0e1626" stroke="#502828" stroke-width="1.2"/>
  <text x="86" y="792" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">MI300X / CDNA 3 (gfx942)</text>
  <text x="86" y="810" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">192 GB HBM3, 8 XCDs, 5.3 TB/s bandwidth</text>

  <rect x="380" y="770" width="290" height="52" rx="14" fill="#0e1626" stroke="#502828" stroke-width="1.2"/>
  <text x="396" y="792" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">MI355X / CDNA 4 (gfx950)</text>
  <text x="396" y="810" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">288 GB HBM3e, Native FP4, 8 TB/s bandwidth</text>

  <rect x="690" y="770" width="340" height="52" rx="14" fill="#0e1626" stroke="#502828" stroke-width="1.2"/>
  <text x="706" y="792" fill="#f0f4fa" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">MI400 / Next-Gen</text>
  <text x="706" y="810" fill="#b8c8de" font-family="Segoe UI, Arial, sans-serif" font-size="12">Rack-scale interconnect, ultra-high bandwidth</text>

  <text x="70" y="862" fill="#a05050" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic">ROCm platform: HIP runtime, hipBLAS, hipRAND, RCCL</text>
</svg>
