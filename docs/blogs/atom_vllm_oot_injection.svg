<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="2000" viewBox="0 0 1320 2000" role="img" aria-labelledby="title desc">
  <title id="title">vLLM execution flow with ATOM</title>
  <desc id="desc">Animated dual-lane timeline showing how vLLM starts, discovers the ATOM out-of-tree platform, injects model wrappers, requests the attention backend, constructs the model, loads weights, compiles, and executes a model step in the OOT path.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#101a31"/>
    </linearGradient>
    <linearGradient id="laneLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(19, 36, 64, 0.92)"/>
      <stop offset="100%" stop-color="rgba(14, 25, 45, 0.82)"/>
    </linearGradient>
    <linearGradient id="laneRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(44, 28, 63, 0.92)"/>
      <stop offset="100%" stop-color="rgba(20, 24, 48, 0.82)"/>
    </linearGradient>
    <linearGradient id="headerLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63cfff"/>
      <stop offset="100%" stop-color="#4c91ff"/>
    </linearGradient>
    <linearGradient id="headerRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d17cff"/>
      <stop offset="100%" stop-color="#8c6bff"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#63cfff"/>
      <stop offset="50%" stop-color="#8f7bff"/>
      <stop offset="100%" stop-color="#ffb870"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020816" flood-opacity="0.48"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67cdff"/>
    </marker>
    <marker id="arrowViolet" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b988ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#72edc0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffb870"/>
    </marker>
    <style>
      .title { fill: #f6fbff; font: 700 36px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.2px; }
      .subtitle { fill: #b1c0d9; font: 500 17px 'Segoe UI', Arial, sans-serif; }
      .lane { stroke: rgba(255,255,255,0.08); stroke-width: 1.5; filter: url(#shadow); }
      .laneHeader { filter: url(#shadow); }
      .laneHeadText { fill: #f8fbff; font: 700 24px 'Segoe UI', Arial, sans-serif; }
      .laneHeadSub { fill: rgba(248,251,255,0.84); font: 500 14px 'Segoe UI', Arial, sans-serif; }
      .spineBase { stroke: rgba(255,255,255,0.12); stroke-width: 5; stroke-linecap: round; }
      .progressLine { stroke: url(#progressGrad); stroke-width: 6; stroke-linecap: round; filter: url(#softGlow); }
      .runner { fill: #ffffff; filter: url(#softGlow); }
      .runnerRing { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 10; }
      .card { fill: rgba(14, 22, 38, 0.88); stroke-width: 2; rx: 22; filter: url(#shadow); }
      .cardBlue { stroke: rgba(99, 207, 255, 0.62); }
      .cardViolet { stroke: rgba(185, 136, 255, 0.62); }
      .cardGreen { stroke: rgba(114, 237, 192, 0.62); }
      .cardOrange { stroke: rgba(255, 184, 112, 0.62); }
      .chip { display: none; font: 700 12px 'Segoe UI', Arial, sans-serif; letter-spacing: 1.1px; text-transform: uppercase; }
      .chipBlue { fill: #84d9ff; }
      .chipViolet { fill: #d0a4ff; }
      .chipGreen { fill: #94f2d1; }
      .chipOrange { fill: #ffd09b; }
      .stepNum { fill: #f6fbff; font: 700 15px 'Segoe UI', Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .stepNodeBlue { fill: #55bbf5; }
      .stepNodeViolet { fill: #a674ff; }
      .stepNodeGreen { fill: #5fd4aa; }
      .stepNodeOrange { fill: #ffb05e; }
      .cardTitle { fill: #f6fbff; font: 700 22px 'Segoe UI', Arial, sans-serif; transform: translateY(-20px); }
      .cardBody { fill: #d8e3f2; font: 500 14px 'Segoe UI', Arial, sans-serif; transform: translateY(-20px); }
      .codePanel { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.08); stroke-width: 1.2; rx: 14; transform: translate(0px,-18px); }
      .codeText { fill: #9fd5ff; font: 600 10.5px Consolas, 'Courier New', monospace; transform: translate(-6px,-18px); }
      .connBlue { stroke: #67cdff; marker-end: url(#arrowBlue); }
      .connViolet { stroke: #b988ff; marker-end: url(#arrowViolet); }
      .connGreen { stroke: #72edc0; marker-end: url(#arrowGreen); }
      .connOrange { stroke: #ffb870; marker-end: url(#arrowOrange); }
      .conn { fill: none; stroke-width: 3; stroke-linecap: round; opacity: 0.9; }
      .step { opacity: 0; }
    </style>
  </defs>

  <rect width="1320" height="2000" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="180" fill="rgba(99, 207, 255, 0.08)"/>
  <circle cx="1170" cy="160" r="220" fill="rgba(185, 136, 255, 0.08)"/>
  <circle cx="1110" cy="1820" r="320" fill="rgba(255, 184, 112, 0.05)"/>

  <text x="52" y="66" class="title">vLLM execution flow with ATOM</text>
  <text x="52" y="98" class="subtitle">OOT startup plugin coupling model construction and one serving step through the ATOM execution path</text>

  <rect x="52" y="118" width="548" height="1830" rx="34" fill="url(#laneLeft)" class="lane"/>
  <rect x="720" y="118" width="548" height="1830" rx="34" fill="url(#laneRight)" class="lane"/>

  <rect x="90" y="150" width="472" height="86" rx="22" fill="url(#headerLeft)" class="laneHeader"/>
  <text x="326" y="186" text-anchor="middle" class="laneHeadText">vLLM</text>
  <text x="326" y="212" text-anchor="middle" class="laneHeadSub">backbone runtime</text>

  <rect x="758" y="150" width="472" height="86" rx="22" fill="url(#headerRight)" class="laneHeader"/>
  <text x="994" y="186" text-anchor="middle" class="laneHeadText">vLLM-ATOM</text>
  <text x="994" y="212" text-anchor="middle" class="laneHeadSub">OOT plugin and model implementation</text>

  <line x1="660" y1="250" x2="660" y2="1850" class="spineBase"/>
  <line x1="660" y1="250" x2="660" y2="250" class="progressLine">
    <animate attributeName="y2" dur="24s" repeatCount="indefinite"
      values="250;250;410;570;730;890;1050;1210;1370;1530;1690;1850;1850"
      keyTimes="0;0.06;0.14;0.22;0.30;0.38;0.46;0.54;0.62;0.70;0.78;0.88;1"/>
  </line>
  <circle cx="660" cy="250" r="13" class="runnerRing">
    <animate attributeName="cy" dur="24s" repeatCount="indefinite"
      values="250;250;410;570;730;890;1050;1210;1370;1530;1690;1850;1850"
      keyTimes="0;0.06;0.14;0.22;0.30;0.38;0.46;0.54;0.62;0.70;0.78;0.88;1"/>
  </circle>
  <circle cx="660" cy="250" r="10" class="runner">
    <animate attributeName="cy" dur="24s" repeatCount="indefinite"
      values="250;250;410;570;730;890;1050;1210;1370;1530;1690;1850;1850"
      keyTimes="0;0.06;0.14;0.22;0.30;0.38;0.46;0.54;0.62;0.70;0.78;0.88;1"/>
  </circle>

  <g class="step">
    <line x1="660" y1="250" x2="580" y2="250" class="conn connBlue"/>
    <circle cx="660" cy="250" r="17" class="stepNodeBlue"/>
    <text x="660" y="250" class="stepNum">1</text>
    <g transform="translate(80 190)">
      <rect width="500" height="150" rx="22" class="card cardBlue"/>
      <text x="26" y="30" class="chip chipBlue">vLLM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">vllm serve</text>
      <text x="26" y="118" class="cardTitle">Start server</text>
      <text x="26" y="142" class="cardBody">Start the vLLM backbone runtime</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.035;0.047;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="410" x2="580" y2="410" class="conn connBlue"/>
    <circle cx="660" cy="410" r="17" class="stepNodeBlue"/>
    <text x="660" y="410" class="stepNum">2</text>
    <g transform="translate(80 340)">
      <rect width="500" height="160" rx="22" class="card cardBlue"/>
      <text x="26" y="30" class="chip chipBlue">vLLM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">load_plugins_by_group("vllm.platform_plugins")</text>
      <text x="26" y="118" class="cardTitle">Load OOT platform plugin</text>
      <text x="26" y="142" class="cardBody">Discover installed platform entry points</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.115;0.127;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="570" x2="740" y2="570" class="conn connViolet"/>
    <circle cx="660" cy="570" r="17" class="stepNodeViolet"/>
    <text x="660" y="570" class="stepNum">3</text>
    <g transform="translate(740 500)">
      <rect width="500" height="160" rx="22" class="card cardViolet"/>
      <text x="26" y="30" class="chip chipViolet">ATOM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">register_platform() -&gt; ATOMPlatform</text>
      <text x="26" y="118" class="cardTitle">Register ATOMPlatform</text>
      <text x="26" y="142" class="cardBody">Return the OOT platform class to vLLM</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.195;0.207;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="730" x2="580" y2="730" class="conn connBlue"/>
    <circle cx="660" cy="730" r="17" class="stepNodeBlue"/>
    <text x="660" y="730" class="stepNum">4</text>
    <g transform="translate(80 660)">
      <rect width="500" height="150" rx="22" class="card cardBlue"/>
      <text x="26" y="30" class="chip chipBlue">vLLM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">load_general_plugins()</text>
      <text x="26" y="118" class="cardTitle">Load OOT model plugin</text>
      <text x="26" y="142" class="cardBody">Load the general plugin registration path</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.275;0.287;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="890" x2="740" y2="890" class="conn connViolet"/>
    <circle cx="660" cy="890" r="17" class="stepNodeViolet"/>
    <text x="660" y="890" class="stepNum">5</text>
    <g transform="translate(740 810)">
      <rect width="500" height="170" rx="22" class="card cardViolet"/>
      <text x="26" y="30" class="chip chipViolet">ATOM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">register_model() -&gt; ModelRegistry.register_model(...)</text>
      <text x="26" y="118" class="cardTitle">Inject ATOM model wrappers</text>
      <text x="26" y="142" class="cardBody">Override supported architectures in vLLM ModelRegistry</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.355;0.367;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="1050" x2="580" y2="1050" class="conn connBlue"/>
    <circle cx="660" cy="1050" r="17" class="stepNodeBlue"/>
    <text x="660" y="1050" class="stepNum">6</text>
    <g transform="translate(80 980)">
      <rect width="500" height="150" rx="22" class="card cardBlue"/>
      <text x="26" y="30" class="chip chipBlue">vLLM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">current_platform.get_attn_backend_cls(...)</text>
      <text x="26" y="118" class="cardTitle">Query attention backend</text>
      <text x="26" y="142" class="cardBody">Ask the current platform for the backend class</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.435;0.447;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="1210" x2="740" y2="1210" class="conn connOrange"/>
    <circle cx="660" cy="1210" r="17" class="stepNodeOrange"/>
    <text x="660" y="1210" class="stepNum">7</text>
    <g transform="translate(740 1130)">
      <rect width="500" height="170" rx="22" class="card cardOrange"/>
      <text x="26" y="30" class="chip chipOrange">ATOM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">ATOMPlatform.get_attn_backend_cls() -&gt; AiterBackend / AiterMLABackend</text>
      <text x="26" y="118" class="cardTitle">Provide AITER attention backend</text>
      <text x="26" y="142" class="cardBody">Return the backend class for vLLM attention construction</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.515;0.527;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="1370" x2="740" y2="1370" class="conn connGreen"/>
    <circle cx="660" cy="1370" r="17" class="stepNodeGreen"/>
    <text x="660" y="1370" class="stepNum">8</text>
    <g transform="translate(740 1290)">
      <rect width="500" height="160" rx="22" class="card cardGreen"/>
      <text x="26" y="30" class="chip chipGreen">ATOM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">ATOMModelWrapper(...); self.model = model_cls(...)</text>
      <text x="26" y="118" class="cardTitle">Construct ATOM model</text>
      <text x="26" y="142" class="cardBody">Build the wrapper and selected ATOM model implementation</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.595;0.607;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="1530" x2="740" y2="1530" class="conn connGreen"/>
    <circle cx="660" cy="1530" r="17" class="stepNodeGreen"/>
    <text x="660" y="1530" class="stepNum">9</text>
    <g transform="translate(740 1450)">
      <rect width="500" height="160" rx="22" class="card cardGreen"/>
      <text x="26" y="30" class="chip chipGreen">ATOM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">model.load_weights(); torch.compile(...)</text>
      <text x="26" y="118" class="cardTitle">Load weights and compile</text>
      <text x="26" y="142" class="cardBody">Load model weights and follow the ATOM compile policy</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.675;0.687;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="1690" x2="580" y2="1690" class="conn connBlue"/>
    <circle cx="660" cy="1690" r="17" class="stepNodeBlue"/>
    <text x="660" y="1690" class="stepNum">10</text>
    <g transform="translate(80 1610)">
      <rect width="500" height="160" rx="22" class="card cardBlue"/>
      <text x="26" y="30" class="chip chipBlue">vLLM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">scheduler.step(); prepare_inputs(...)</text>
      <text x="26" y="118" class="cardTitle">Schedule and prepare inputs</text>
      <text x="26" y="142" class="cardBody">Prepare the next serving step before invoking the model</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.755;0.767;0.99;1"/>
  </g>

  <g class="step">
    <line x1="660" y1="1850" x2="740" y2="1850" class="conn connOrange"/>
    <circle cx="660" cy="1850" r="17" class="stepNodeOrange"/>
    <text x="660" y="1850" class="stepNum">11</text>
    <g transform="translate(740 1770)">
      <rect width="500" height="170" rx="22" class="card cardOrange"/>
      <text x="26" y="30" class="chip chipOrange">ATOM</text>
      <rect x="20" y="48" width="460" height="40" class="codePanel"/>
      <text x="38" y="74" class="codeText">build_attention_metadata(); model.forward(); model.compute_logits()</text>
      <text x="26" y="118" class="cardTitle">Run one model step</text>
      <text x="26" y="142" class="cardBody">Build metadata run forward and compute logits in the OOT path</text>
    </g>
    <animate attributeName="opacity" dur="24s" repeatCount="indefinite"
      values="0;0;1;1;0" keyTimes="0;0.855;0.867;0.99;1"/>
  </g>
</svg>
